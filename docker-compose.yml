services:

  mosquitto:
    image: eclipse-mosquitto
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: futureKawa
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./controllers/database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  flask:
    build: .
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
    env_file:
      - .env

volumes:
  mysql_data: